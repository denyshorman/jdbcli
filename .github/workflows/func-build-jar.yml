name: Build Jar

on:
  workflow_call:
    outputs:
      ARTIFACT_ID:
        value: ${{ jobs.build-jar.outputs.ARTIFACT_ID }}

jobs:
  build-jar:
    name: Build Jar
    runs-on: ubuntu-latest
    outputs:
      ARTIFACT_ID: ${{ env.ARTIFACT_ID }}
    env:
      ARTIFACT_ID: jdbcli-${{ github.sha }}.jar
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Build with Gradle
        run: ./gradlew shadowJar --no-daemon --parallel -x test
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        id: upload-jar
        with:
          name: ${{ env.ARTIFACT_ID }}
          path: build/libs/jdbcli.jar
          if-no-files-found: error
          retention-days: 1
          overwrite: true
